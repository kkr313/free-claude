services:
  - type: web
    name: free-claude-code
    runtime: python
    pythonVersion: 3.14
    buildCommand: python -m pip install --upgrade uv && python -m uv self update && python -m uv sync --frozen && python -m uv cache prune --ci
    startCommand: fcc-server
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8082
      - key: NVIDIA_NIM_API_KEY
        scope: build
        sync: false
      - key: OPENROUTER_API_KEY
        scope: build
        sync: false
